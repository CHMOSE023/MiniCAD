<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MiniCAD Web</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #15171b;
      color: #f0f3f6;
      font: 12px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
    }

    #app {
      display: grid;
      grid-template-rows: 40px 1fr 22px;
      width: 100vw;
      height: 100vh;
    }

    /* ── Toolbar ────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 4px 8px;
      background: #1e2229;
      border-bottom: 1px solid #2e333d;
      overflow-x: auto;
    }

    .tb-sep {
      width: 1px;
      height: 20px;
      background: #3a414d;
      margin: 0 4px;
      flex-shrink: 0;
    }

    .tb-label {
      font-size: 10px;
      color: #6b7280;
      padding: 0 4px;
      flex-shrink: 0;
    }

    button {
      height: 28px;
      padding: 0 7px;
      border: 1px solid #3a414d;
      border-radius: 3px;
      background: #272c34;
      color: #d8dde5;
      cursor: pointer;
      font: 11px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      white-space: nowrap;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: background 0.1s, border-color 0.1s;
    }

    button:hover { background: #333a44; border-color: #5a6270; }
    button:active { background: #1e6fb5; border-color: #2a8ad4; }

    button.active {
      background: #1a5fa0;
      border-color: #2a8ad4;
      color: #ffffff;
    }

    button.toggle-on {
      background: #1a5f40;
      border-color: #2a9d6a;
      color: #7effd4;
    }

    button.danger { border-color: #7a3030; }
    button.danger:hover { background: #5a2525; }

    .tb-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      pointer-events: none;
      display: block;
    }

    /* ── SVG icon fallbacks ─────────────────────── */
    .icon-point {
      background: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='3.5' fill='%23c0c8d0'/></svg>") center/contain no-repeat;
    }
    .icon-delete {
      background: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none' stroke='%23c0c8d0' stroke-width='1.3'><line x1='2' y1='4' x2='14' y2='4'/><path d='M5 4V3h6v1'/><rect x='3' y='4.5' width='10' height='9' rx='1'/><line x1='6.5' y1='7' x2='6.5' y2='11'/><line x1='9.5' y1='7' x2='9.5' y2='11'/></svg>") center/contain no-repeat;
    }
    .icon-snap {
      background: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none' stroke='%23c0c8d0' stroke-width='1.5'><path d='M4 9a4 4 0 0 1 8 0'/><line x1='4' y1='9' x2='4' y2='13'/><line x1='12' y1='9' x2='12' y2='13'/><line x1='3' y1='13' x2='5' y2='13'/><line x1='11' y1='13' x2='13' y2='13'/></svg>") center/contain no-repeat;
    }
    .icon-ortho {
      background: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' stroke='%23c0c8d0' stroke-width='1.5' fill='none'><polyline points='3 3 3 13 13 13'/><rect x='3' y='9' width='4' height='4'/></svg>") center/contain no-repeat;
    }
    .icon-cancel {
      background: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' stroke='%23c0c8d0' stroke-width='2'><line x1='3' y1='3' x2='13' y2='13'/><line x1='13' y1='3' x2='3' y2='13'/></svg>") center/contain no-repeat;
    }

    /* ── Canvas area ────────────────────────────── */
    #canvas-wrap {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
      cursor: crosshair;
      touch-action: none;
    }

    /* ── Status bar ─────────────────────────────── */
    #status {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 8px;
      background: #1a1e25;
      border-top: 1px solid #2a2f38;
      color: #8a9099;
      font-size: 11px;
      overflow: hidden;
    }

    #status .seg {
      padding: 0 10px;
      border-right: 1px solid #2e333d;
      height: 100%;
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    #status .seg:first-child { padding-left: 0; }

    #mode-label { color: #60b8ff; font-weight: 600; }
    #snap-label { color: #50d890; }
    #ortho-label { color: #ffa050; }
    .hint { color: #5a6270; }
  </style>
</head>
<body>
  <div id="app">

    <!-- ── Toolbar ───────────────────────────────────────────── -->
    <div id="toolbar">

      <!-- Draw tools -->
      <span class="tb-label">绘制</span>
      <button id="btn-line"      title="直线 (L)"><img class="tb-icon" id="ico-line" alt=""> 直线</button>
      <button id="btn-polyline"  title="多段线 (PL)"><img class="tb-icon" id="ico-polyline" alt=""> 多段线</button>
      <button id="btn-circle"    title="圆 (C)"><img class="tb-icon" id="ico-circle" alt=""> 圆</button>
      <button id="btn-arc"       title="圆弧 (ARC)"><img class="tb-icon" id="ico-arc" alt=""> 圆弧</button>
      <button id="btn-ellipse"   title="椭圆 (EL)"><img class="tb-icon" id="ico-ellipse" alt=""> 椭圆</button>
      <button id="btn-rectangle" title="矩形 (REC)"><img class="tb-icon" id="ico-rectangle" alt=""> 矩形</button>
      <button id="btn-spline"    title="样条曲线 (SP)"><img class="tb-icon" id="ico-spline" alt=""> 样条</button>
      <button id="btn-point"     title="点 (PT)"><span class="tb-icon icon-point"></span> 点</button>

      <div class="tb-sep"></div>

      <!-- Edit tools -->
      <span class="tb-label">编辑</span>
      <button id="btn-move"   title="移动 (M)"><img class="tb-icon" id="ico-move" alt=""> 移动</button>
      <button id="btn-copy"   title="复制 (CO)"><img class="tb-icon" id="ico-copy" alt=""> 复制</button>
      <button id="btn-mirror" title="镜像 (MI)"><img class="tb-icon" id="ico-mirror" alt=""> 镜像</button>
      <button id="btn-rotate" title="旋转 (RO)"><img class="tb-icon" id="ico-rotate" alt=""> 旋转</button>
      <button id="btn-delete" title="删除 (Del)" class="danger"><span class="tb-icon icon-delete"></span> 删除</button>

      <div class="tb-sep"></div>

      <!-- Toggles -->
      <button id="btn-snap"  title="捕捉开关 (F3)"><span class="tb-icon icon-snap"></span> 捕捉</button>
      <button id="btn-ortho" title="正交开关 (F8)"><span class="tb-icon icon-ortho"></span> 正交</button>

      <div class="tb-sep"></div>

      <!-- History + misc -->
      <button id="btn-undo"   title="撤销 (Ctrl+Z)"><img class="tb-icon" id="ico-undo" alt=""> 撤销</button>
      <button id="btn-redo"   title="重做 (Ctrl+Y)"><img class="tb-icon" id="ico-redo" alt=""> 重做</button>
      <button id="btn-cancel" title="取消 / ESC"><span class="tb-icon icon-cancel"></span> 取消</button>
    </div>

    <!-- ── Canvas ─────────────────────────────────────────────── -->
    <div id="canvas-wrap">
      <canvas id="minicad-canvas" tabindex="0" oncontextmenu="return false"></canvas>
    </div>

    <!-- ── Status bar ────────────────────────────────────────── -->
    <div id="status">
      <span class="seg"><span id="mode-label">就绪</span></span>
      <span class="seg hint">左键: 绘制/选择</span>
      <span class="seg hint">中键拖动: 平移</span>
      <span class="seg hint">滚轮: 缩放</span>
      <span class="seg hint">右键/Esc: 结束</span>
      <span class="seg hint">Enter/Space: 重复命令</span>
      <span class="seg"><span id="snap-label">捕捉: ON</span></span>
      <span class="seg"><span id="ortho-label" style="color:#5a6270">正交: OFF</span></span>
    </div>

  </div><!-- #app -->

    // Apply PNG icons immediately (before WASM loads)
    for (const [id, src] of Object.entries(PNG_ICONS)) {
      const el = document.getElementById(id);
      if (el) el.src = src;
    }

    const canvas    = document.getElementById('minicad-canvas');
    const modeLabel = document.getElementById('mode-label');
    const snapLabel = document.getElementById('snap-label');
    const orthoLabel= document.getElementById('ortho-label');

    let snapOn  = true;
    let orthoOn = false;
    let activeTool = null;

    // ── Canvas CSS size sync ──────────────────────────────
    function syncCanvasCssSize() {
      const wrap = document.getElementById('canvas-wrap');
      const rect = wrap.getBoundingClientRect();
      canvas.style.width  = `${Math.max(1, Math.floor(rect.width))}px`;
      canvas.style.height = `${Math.max(1, Math.floor(rect.height))}px`;
    }

    // ── Call a WASM export ────────────────────────────────
    function call(name) {
      if (!Module.runtimeReady) return;
      Module.ccall(name, null, [], []);
    }

    function setMode(label) {
      modeLabel.textContent = label;
    }

    function activateBtn(id) {
      if (activeTool) {
        const prev = document.getElementById(activeTool);
        if (prev) prev.classList.remove('active');
      }
      activeTool = id;
      if (id) {
        const btn = document.getElementById(id);
        if (btn) btn.classList.add('active');
      }
    }

    function toolBtn(btnId, exportName, label) {
      document.getElementById(btnId).onclick = () => {
        canvas.focus();
        call(exportName);
        setMode(label);
        activateBtn(btnId);
      };
    }

    function actionBtn(btnId, exportName, label) {
      document.getElementById(btnId).onclick = () => {
        canvas.focus();
        call(exportName);
        setMode(label);
      };
    }

    // ── Module ─────────────────────────────────────────────
    var Module = {
      canvas,
      onRuntimeInitialized() {
        syncCanvasCssSize();
        window.addEventListener('resize', syncCanvasCssSize);
        Module.runtimeReady = true;

        // Draw tools
        toolBtn('btn-line',      'MiniCAD_StartLine',      '直线');
        toolBtn('btn-polyline',  'MiniCAD_StartPolyline',  '多段线');
        toolBtn('btn-circle',    'MiniCAD_StartCircle',    '圆');
        toolBtn('btn-arc',       'MiniCAD_StartArc',       '圆弧');
        toolBtn('btn-ellipse',   'MiniCAD_StartEllipse',   '椭圆');
        toolBtn('btn-rectangle', 'MiniCAD_StartRectangle', '矩形');
        toolBtn('btn-spline',    'MiniCAD_StartSpline',    '样条');
        toolBtn('btn-point',     'MiniCAD_StartPoint',     '点');

        // Edit tools
        toolBtn('btn-move',   'MiniCAD_StartMove',   '移动');
        toolBtn('btn-copy',   'MiniCAD_StartCopy',   '复制');
        toolBtn('btn-mirror', 'MiniCAD_StartMirror', '镜像');
        toolBtn('btn-rotate', 'MiniCAD_StartRotate', '旋转');

        // Delete
        document.getElementById('btn-delete').onclick = () => {
          canvas.focus();
          call('MiniCAD_Delete');
          setMode('就绪');
          activateBtn(null);
        };

        // Snap toggle
        document.getElementById('btn-snap').onclick = () => {
          canvas.focus();
          call('MiniCAD_ToggleSnap');
          snapOn = !snapOn;
          snapLabel.textContent = `捕捉: ${snapOn ? 'ON' : 'OFF'}`;
          snapLabel.style.color  = snapOn ? '#50d890' : '#5a6270';
          document.getElementById('btn-snap').classList.toggle('toggle-on', snapOn);
        };
        document.getElementById('btn-snap').classList.add('toggle-on');

        // Ortho toggle
        document.getElementById('btn-ortho').onclick = () => {
          canvas.focus();
          call('MiniCAD_ToggleOrtho');
          orthoOn = !orthoOn;
          orthoLabel.textContent = `正交: ${orthoOn ? 'ON' : 'OFF'}`;
          orthoLabel.style.color  = orthoOn ? '#ffa050' : '#5a6270';
          document.getElementById('btn-ortho').classList.toggle('toggle-on', orthoOn);
        };

        // History & misc
        actionBtn('btn-undo', 'MiniCAD_Undo', '撤销');
        actionBtn('btn-redo', 'MiniCAD_Redo', '重做');

        document.getElementById('btn-cancel').onclick = () => {
          canvas.focus();
          call('MiniCAD_Cancel');
          setMode('就绪');
          activateBtn(null);
        };

        setMode('就绪');
        canvas.focus();
      }
    };
  </script>
  {{{ SCRIPT }}}
</body>
